name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm -r build

      - name: Report bundle size
        run: |
          gzip -c packages/plume/dist/index.js | wc -c | awk '{ printf "plume gzipped: %.1f KB\n", $1/1024 }'
          wc -c < packages/plume/dist/index.js | awk '{ printf "plume raw:     %.1f KB\n", $1/1024 }'
